<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* centre horizontalement */
            justify-content: center;
            /* centre verticalement */
            height: 100vh;
            /* prend toute la hauteur */
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", Arial;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 20px;
            /* espace entre la grille/pad et le message */
        }

        td {
            text-align: center;
        }

        .message {
            color: black;
        }
    </style>
</head>

<body>
    <table>
        {% for row in grid %}
        <tr>
            {% for cell in row %}
            <td style="width:50px; height:50px; background-color:{% if cell %}rgb(186, 148, 117){% else %}rgb(206, 168, 137){% endif %}; 
             text-align:center; color:black;">
                {% if cell %}
                {{ cell }}
                {% endif %}
            </td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>

    <!-- Pad directionnel -->
    <table>
        <tr>Use button or numerical keypad (up=8, right=6, down=2, left=4, ai=5)</tr>
        <tr>
            <td></td>
            <td>
                <form id="upForm" action="UP" method="post">
                    <button type="submit"
                        style="width:40px; height:40px; background-color:rgb(206, 168, 137); color:black;">↑</button>
                </form>
            </td>
            <td></td>
        </tr>
        <tr>
            <td>
                <form id="leftForm" action="LEFT" method="post">
                    <button type="submit"
                        style="width:40px; height:40px; background-color:rgb(206, 168, 137); color:black;">←</button>
                </form>
            </td>
            <td>
                <form id="aiForm" action="AI" method="post">
                    <button type="submit"
                        style="width:40px; height:40px; background-color:rgb(206, 168, 137); color:black;">AI</button>
                </form>
            </td>
            <td>
                <form id="rightForm" action="RIGHT" method="post">
                    <button type="submit"
                        style="width:40px; height:40px; background-color:rgb(206, 168, 137); color:black;">→</button>
                </form>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <form id="downForm" action="DOWN" method="post">
                    <button type="submit"
                        style="width:40px; height:40px; background-color:rgb(206, 168, 137); color:black;">↓</button>
                </form>
            </td>
            <td></td>
        </tr>
    </table>

    <!-- Message centré -->
    <div class="message">
        <h3>
            {% if message %}
            {{ message }}
            {% else %}
            {{ "_" }}
            {% endif %}
        </h3>
    </div>

    <script>
        document.addEventListener("keydown", function (event) {
            switch (event.key) {
                case "8": // UP
                    document.getElementById("upForm").submit();
                    break;
                case "2": // DOWN
                    document.getElementById("downForm").submit();
                    break;
                case "4": // LEFT
                    document.getElementById("leftForm").submit();
                    break;
                case "6": // RIGHT
                    document.getElementById("rightForm").submit();
                    break;
                case "5": // AI
                    document.getElementById("aiForm").submit();
                    break;
            }
        });
    </script>
</body>

</html>
